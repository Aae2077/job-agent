cover_letter_style:
  key_narrative: >
    From early on I've been drawn to how money moves and shapes the world — not as an
    abstraction, but as something to analyze and act on. At UCSC I've turned that curiosity
    into hands-on work: leading equity research at the IB Academy, building DCF and comps
    models at the Santa Cruz Investment Fund, and managing a chapter budget as VP of Finance
    for AKPsi. I'm not just interested in finance — I've been doing it. Now I want to bring
    that foundation into a professional setting and keep growing.
  voice: "Formal and organized, but should feel personal and specific — not generic. Structured paragraphs, professional tone, no slang."
  one_page: true
  example_letter_notes: >
    Aiden's existing cover letter (March 2026, UC OP internship) is clean and well-organized
    but leans generic — it opens with 'I am writing to express my interest' and doesn't cite
    specific metrics or accomplishments. The AI should preserve the professional, structured
    tone but always substitute generic language with specific details: name actual models built,
    funds worked at, dollar amounts, and concrete skills. Never use filler phrases like
    'I would welcome the opportunity' or 'align closely with my career goals.'
  strengths:
    - "Professional and organized — good structure, clean paragraphs"
    - "Bilingual (Spanish/English) — worth mentioning for firms with Latin America coverage"
    - "Genuine interest in finance — not just credential-stacking"
  improvements_over_example:
    - "Lead with a specific hook — why this firm or this role, not just 'I am writing to apply'"
    - "Name actual experience: DCF models, trading comps, Santa Cruz Investment Fund, IB Academy"
    - "Use metrics wherever possible ($10K fundraising, 5+ companies analyzed, $5K savings)"
    - "Close with confidence, not just 'I look forward to the possibility of discussing'"
  style_notes:
    - "Keep it under one page"
    - "No corporate filler phrases"
    - "Open with genuine company-specific interest or a brief hook about why IB/PE/WM"
    - "Always tie specific hands-on experience to the role's actual responsibilities"
    - "Formal tone but not stiff — sounds like a sharp sophomore, not a robot"
